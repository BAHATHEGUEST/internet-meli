name: Download External Files with Python

on:
  workflow_dispatch:
  push:

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run download script
        run: |
          python main.py

      - name: Commit and Push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          
          git add downloads/
          
          if git diff --cached --quiet; then
            echo "No new or changed files to commit."
          else
            git commit -m "Update downloaded files via Python script"
            git push origin HEAD:${{ github.ref }}
          fi
