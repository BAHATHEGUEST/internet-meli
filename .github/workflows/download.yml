name: Download External Files with Python

on:
  workflow_dispatch:
  push:

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13' 
          
      - name: Run download script
        run: python main.py

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/$GITHUB_REPOSITORY


      - name: Commit and Pull
        run: |
          git add downloads/
          git diff --cached --quiet || (git commit -m "[UPDATE] downloaded files via Python")
          git pull --rebase --autostash origin master
          

      - name: Push changes
        run: |
          n=0
          until [ $n -ge 5 ]
          do
            git push origin HEAD:master && break
            n=$((n+1))
            echo "Push failed. Retrying in 5 seconds... ($n/5)"
            sleep 5
          done

   
